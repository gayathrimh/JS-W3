<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Operators</h1>
    <p id="demo">= Assignment Operators</p>
    <p id="demo1">Arithmetic Operators</p>
    <p id="demo2">Expression </p>
    <script>
        let x=5;
        let y=6;
        let sum=x+y;
        document.getElementById("demo").innerHTML="The sum of x and y is " + sum;
        document.getElementById("demo1").innerHTML=5*10;
        document.getElementById("demo2").innerHTML=(5+6)*10;
    </script>
</body>
</html>
